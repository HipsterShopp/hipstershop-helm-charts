
global:
  namespaces:
    backend:  hipster-backend
    database: hipster-database

  images:
    authservice: "yampss/hipstershop-authservice:latest"   
    mongodb:     mongo:7.0                                  

  replicas:
    authservice: 1

  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  ports:
    authservice: 8081

  resources:
    standard:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  mongodb:
    users:
      auth:
        database: auth_db
