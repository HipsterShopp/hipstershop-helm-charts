
global:
  namespaces:
    backend:  hipster-backend
    database: hipster-database

  images:
    cartservice: "yampss/hipstershop-cartservice:latest"   
    mongodb:     mongo:7.0              

  replicas:
    cartservice: 1

  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  ports:
    cartservice: 7070

  resources:
    cartservice:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi

  mongodb:
    users:
      cart:
        database: cart_db
