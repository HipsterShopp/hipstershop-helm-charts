apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistantservice
  namespace: {{ .Values.global.namespaces.backend }}
spec:
  replicas: {{ .Values.global.replicas.assistantservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.global.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.global.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: assistantservice
  template:
    metadata:
      labels:
        app: assistantservice
        tier: backend
    spec:
      containers:
      - name: server
        image: {{ .Values.global.images.assistantservice }}
        ports:
        - containerPort: {{ .Values.global.ports.assistantservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: GATEWAY_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: GATEWAY_ADDR
        - name: GEMINI_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-features
              key: GEMINI_MODEL
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GEMINI_API_KEY
        resources:
          requests:
            cpu: {{ .Values.global.resources.standard.requests.cpu }}
            memory: {{ .Values.global.resources.standard.requests.memory }}
          limits:
            cpu: {{ .Values.global.resources.standard.limits.cpu }}
            memory: {{ .Values.global.resources.standard.limits.memory }}
        readinessProbe:
          httpGet:
            path: "/_healthz"
            port: {{ .Values.global.ports.assistantservice }}
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: "/_healthz"
            port: {{ .Values.global.ports.assistantservice }}
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 5
        startupProbe:
          httpGet:
            path: "/_healthz"
            port: {{ .Values.global.ports.assistantservice }}
          failureThreshold: 30
          periodSeconds: 5
