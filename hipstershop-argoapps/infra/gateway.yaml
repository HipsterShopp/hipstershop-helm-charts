apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway
  namespace: argocd
  annotations:
    # Wave 2 — runs after hipster-backend namespace exists (backend-common wave 0)
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hipstershop

  source:
    repoURL: https://github.com/HipsterShopp/hipstershop-helm-charts
    targetRevision: main
    path: hipstershop-infra/gateway
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: hipster-backend   # Gateway resource lives here; GatewayClass is cluster-scoped

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true           # required for Gateway API CRDs
      - RespectIgnoreDifferences=true  # stop re-applying normalized fields

  # GatewayClass is cluster-scoped — suppress kgateway-owned field drift
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: GatewayClass
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec/parametersRef
    # Kubernetes normalizes HTTPRoute backendRefs and parentRefs:
    #   - drops group: "" and kind: Service  (they are the defaults)
    #   - drops weight: 1                    (default weight)
    #   - drops group: gateway.networking.k8s.io and kind: Gateway from parentRefs
    # ArgoCD still sends them → perpetual OutOfSync without this block.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - '.spec.rules[].backendRefs[].group'
        - '.spec.rules[].backendRefs[].kind'
        - '.spec.rules[].backendRefs[].weight'
        - '.spec.parentRefs[].group'
        - '.spec.parentRefs[].kind'
