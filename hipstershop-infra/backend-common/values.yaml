
# ─────────────────────────────────────────────────────────────────────────────
#  backend-common — base values
#
#  SECRET HANDLING FOR THE TEAM:
#  This file contains placeholder values only ( REPLACE_WITH_* ).
#  Real credentials are NEVER committed to git.
#
#  How to run locally or in a NEW cluster:
#   1. Copy  values.secret.yaml.example  →  values.secret.yaml
#   2. Fill in the real values in  values.secret.yaml
#   3. values.secret.yaml is .gitignored — it will never be committed
#
#  In ArgoCD: create the Application with both value files:
#    helm:
#      valueFiles: [values.yaml, values.secret.yaml]
#  OR pass overrides via ArgoCD UI (App Details → Parameters → Edit).
# ─────────────────────────────────────────────────────────────────────────────

global:
  namespaces:
    frontend: hipster-frontend
    backend:  hipster-backend
    database: hipster-database

  secrets:
    jwtSecret:    "REPLACE_WITH_JWT_SECRET"
    geminiApiKey: "REPLACE_WITH_GEMINI_API_KEY"


  appConfig:
    enableTracing:        "1"
    collectorServiceAddr: "jaeger:4317"
    frontendMessage:      "Checkout HipsterShop today!"
    enableAssistant:      "true"

  features:
    currencyServiceRandomError:    "1"
    paymentServiceDisableProfiler: "1"
    productCatalogSeedDatabase:    "true"
    geminiModel:                   "gemini-2.5-flash"

  gateway:
    name: hipstershop-gateway
    port: 80

  ports:
    productcatalogservice: 3550
    shippingservice:       50051
    paymentservice:        50051
    emailservice:          8080
    currencyservice:       7000
    cartservice:           7070

    adservice:             9555
    authservice:           8081
    checkoutservice:       5050
    frontend:              8080
    recommendationservice: 8080
    assistantservice:      8080

  mongodb:
    rootUsername: admin
    rootPassword: "REPLACE_WITH_MONGO_ROOT_PASSWORD"
    users:
      auth:
        username: auth_user
        password: "REPLACE_WITH_AUTH_MONGO_PASSWORD"
        database: auth_db
      cart:
        username: cart_user
        password: "REPLACE_WITH_CART_MONGO_PASSWORD"
        database: cart_db
      catalog:
        username: catalog_user
        password: "REPLACE_WITH_CATALOG_MONGO_PASSWORD"
        database: catalog_db
      order:
        username: order_user
        password: "REPLACE_WITH_ORDER_MONGO_PASSWORD"
        database: order_db
      payment:
        username: payment_user
        password: "REPLACE_WITH_PAYMENT_MONGO_PASSWORD"
        database: payment_db
      notification:
        username: notification_user
        password: "REPLACE_WITH_NOTIFICATION_MONGO_PASSWORD"
        database: notification_db
      analytics:
        username: analytics_user
        password: "REPLACE_WITH_ANALYTICS_MONGO_PASSWORD"
        database: analytics_db

  mongodbConfig:
    replicaSet:                         rs0
    catalogProductsCollection:          products
    orderOrdersCollection:              orders
    orderEventsCollection:              order_events
    paymentChargesCollection:           charges
    analyticsRecommendationsCollection: recommendations
    notificationEmailEventsCollection:  email_events

  networkPolicy:
    vpcCidr:           "172.31.0.0/16"
    kgatewayNamespace: "kgateway-system"
