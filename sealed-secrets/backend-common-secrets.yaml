---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secrets
  namespace: hipster-backend
spec:
  encryptedData:
    GEMINI_API_KEY: 
    JWT_SECRET: 
  template:
    metadata:
      name: app-secrets
      namespace: hipster-backend
---
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongodb-root
  namespace: hipster-backend
spec:
  encryptedData:
    MONGO_ROOT_PASSWORD: 
    MONGO_ROOT_USERNAME: 
  template:
    metadata:
      name: mongodb-root
      namespace: hipster-backend
---
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongodb-users
  namespace: hipster-backend
spec:
  encryptedData:
    ANALYTICS_MONGO_PASSWORD: 
    ANALYTICS_MONGO_USERNAME: 
    AUTH_MONGO_PASSWORD: 
    AUTH_MONGO_USERNAME: 
    CART_MONGO_PASSWORD: 
    CART_MONGO_USERNAME: 
    CATALOG_MONGO_PASSWORD: 
    CATALOG_MONGO_USERNAME: 
    NOTIFICATION_MONGO_PASSWORD: 
    NOTIFICATION_MONGO_USERNAME: 
    ORDER_MONGO_PASSWORD: 
    ORDER_MONGO_USERNAME: 
    PAYMENT_MONGO_PASSWORD: 
    PAYMENT_MONGO_USERNAME: 
  template:
    metadata:
      name: mongodb-users
      namespace: hipster-backend
