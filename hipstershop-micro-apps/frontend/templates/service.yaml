
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.global.namespaces.frontend }}
  name: frontend-active
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: {{ .Values.global.ports.frontendSvc }}
    targetPort: {{ .Values.global.ports.frontend }}
---

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.global.namespaces.frontend }}
  name: frontend-preview
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: {{ .Values.global.ports.frontendSvc }}
    targetPort: {{ .Values.global.ports.frontend }}
