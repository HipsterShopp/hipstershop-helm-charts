{{- $ns := .Values.global.namespaces -}}
{{- $ports := .Values.global.ports -}}
{{- $gw := .Values.global.gateway -}}
# ── Frontend Route (cross-namespace) ─────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: {{ $ns.backend }}
  name: frontend-route
  labels:
    app: frontend
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gw.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /static/
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: Exact
            value: /_healthz
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /product
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /cart
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: Exact
            value: /setCurrency
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: Exact
            value: /login
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: Exact
            value: /signup
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: Exact
            value: /logout
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
          weight: 1
---
# ── Backend Service Routes ───────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: {{ $ns.backend }}
  name: ad-route
  labels:
    app: adservice
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gw.name }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /api/ads
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /ads
      backendRefs:
        - group: ""
          kind: Service
          name: adservice
          port: {{ $ports.adservice }}
          weight: 1
---
