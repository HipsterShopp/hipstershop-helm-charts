# ─────────────────────────────────────────────────────────────
#  shippingservice — prod overrides
# ─────────────────────────────────────────────────────────────
global:
  replicas:
    shippingservice: 2
  resources:
    standard:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 200m, memory: 256Mi }
  images:
    shippingservice: "yampss/hipstershop-shippingservice:latest"
