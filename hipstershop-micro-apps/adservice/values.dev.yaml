# ─────────────────────────────────────────────────────────────
#  adservice — dev overrides
#  Replicas: 1  |  Image: managed by ArgoCD Image Updater (develop-* tags)
# ─────────────────────────────────────────────────────────────
global:
  replicas:
    adservice: 1

  resources:
    adservice:
      requests:
        cpu: 100m
        memory: 90Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Fallback tag — Image Updater overwrites via .argocd-source-adservice-dev.yaml
  images:
    adservice: "yampss/hipstershop-adservice:develop-fe14e3a9"
