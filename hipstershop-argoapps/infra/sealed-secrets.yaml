apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-manifests
  namespace: argocd
  annotations:
    # Wave 1 — must run AFTER mongodb (wave 0) and backend-common (wave 0)
    # so both hipster-database and hipster-backend namespaces exist first.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hipstershop

  source:
    repoURL: https://github.com/HipsterShopp/hipstershop-helm-charts
    targetRevision: main
    path: sealed-secrets   # raw YAML directory, not Helm
    # No helm: block — ArgoCD detects plain YAML and applies directly

  destination:
    server: https://kubernetes.default.svc
    # SealedSecrets specify their own namespace in metadata.namespace —
    # this is just the ArgoCD fallback and won't override the resources.
    namespace: hipster-backend

  syncPolicy:
    automated:
      selfHeal: true
      prune: true   # safe to prune — controller regenerates Secrets from SealedSecrets
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
