global:
  namespaces:
    backend: hipster-backend

  images:
    currencyservice: "yampss/hipstershop-currencyservice:latest"   

  replicas:
    currencyservice: 1

  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  ports:
    currencyservice: 7000

  resources:
    standard:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
