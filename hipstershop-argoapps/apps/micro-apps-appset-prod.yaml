# ─────────────────────────────────────────────────────────────
#  micro-apps-appset-prod.yaml
#  Deploy to: PROD cluster (your cluster)
#  Tracks:    main branch of hipstershop-helm-charts
#  Apply to prod cluster: kubectl apply -f this file -n argocd
# ─────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: micro-apps-prod
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - { name: adservice,             namespace: hipster-backend }
          - { name: authservice,           namespace: hipster-backend }
          - { name: cartservice,           namespace: hipster-backend }
          - { name: checkoutservice,       namespace: hipster-backend }
          - { name: currencyservice,       namespace: hipster-backend }
          - { name: emailservice,          namespace: hipster-backend }
          - { name: frontend,              namespace: hipster-frontend }
          - { name: paymentservice,        namespace: hipster-backend }
          - { name: productcatalogservice, namespace: hipster-backend }
          - { name: recommendationservice, namespace: hipster-backend }
          - { name: shippingservice,       namespace: hipster-backend }
          - { name: assistantservice,      namespace: hipster-backend }

  template:
    metadata:
      name: '{{name}}-prod'
      namespace: argocd
      annotations:
        # ── ArgoCD Image Updater ──────────────────────────────────────
        # Watches for new semver-tagged images on DockerHub
        # Writes the tag back to main branch via .argocd-source-<name>-prod.yaml
        argocd-image-updater.argoproj.io/image-list: "img=yampss/hipstershop-{{name}}"
        argocd-image-updater.argoproj.io/img.update-strategy: semver
        argocd-image-updater.argoproj.io/img.helm.image-spec: "global.images.{{name}}"
        argocd-image-updater.argoproj.io/write-back-method: git
        argocd-image-updater.argoproj.io/git-branch: main

    spec:
      project: hipstershop

      source:
        repoURL: https://github.com/HipsterShopp/hipstershop-helm-charts
        targetRevision: main
        path: 'hipstershop-micro-apps/{{name}}'
        helm:
          valueFiles:
            - values.yaml
            - values.prod.yaml

      destination:
        server: https://kubernetes.default.svc   # prod cluster's local API
        namespace: '{{namespace}}'

      syncPolicy:
        automated:
          selfHeal: true
          prune: false         # prod cluster — never auto-prune
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
