
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.global.namespaces.backend }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow
  namespace: {{ .Values.global.namespaces.backend }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:

  - from:
    - ipBlock:

        cidr: {{ .Values.global.networkPolicy.vpcCidr | default "172.31.0.0/16" }}  

  - from:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.global.namespaces.frontend }}

  - from:
    - podSelector: {}
  egress:

  - to:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.global.namespaces.database }}

  - to:
    - podSelector: {}

  - to:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.global.namespaces.frontend }}

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.global.networkPolicy.kgatewayNamespace | default "kgateway-system" }}

  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 443

  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: emailservice-allow-smtp
  namespace: {{ .Values.global.namespaces.backend }}
spec:
  podSelector:
    matchLabels:
      app: emailservice
  policyTypes:
  - Egress
  egress:

  - to:
    - ipBlock:
        cidr: 0.0.0.0/0 
    ports:
    - protocol: TCP
      port: 587
