# ─────────────────────────────────────────────────────────────
#  adservice — prod overrides
#  Replicas: 2  |  Image: managed by ArgoCD Image Updater (semver tags)
# ─────────────────────────────────────────────────────────────
global:
  replicas:
    adservice: 1

  resources:
    adservice:
      requests:
        cpu: 200m
        memory: 180Mi
      limits:
        cpu: 300m
        memory: 512Mi

  # Prod image — GHCR (public package). CI updates this tag on every approved main push.
  # Dev image (DockerHub) is in values.dev.yaml and is unchanged.
  images:
    adservice: "ghcr.io/hipstershopoo/hipstershop-adservice:adservice-v0.1.5"
